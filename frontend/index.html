<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Nifty Options Viewer</title>
    <!-- PWA / installable -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0b0e16" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stratos Sim" />
    <!-- Apply the saved template theme + light/dark mode before first paint (shared with StratosAI). -->
    <script>
      (function () {
        try {
          var ids = ['cosmic', 'neumorphic', 'bento', 'swiss', 'glass', 'mesh', 'y2k', 'japanese']
          var natural = { cosmic: 'dark', neumorphic: 'light', bento: 'dark', swiss: 'light', glass: 'light', mesh: 'light', y2k: 'light', japanese: 'light' }
          var t = localStorage.getItem('stratos-theme')
          if (!t || ids.indexOf(t) < 0) t = 'cosmic'
          var m = localStorage.getItem('stratos-mode')
          if (m !== 'light' && m !== 'dark') m = natural[t]
          var r = document.documentElement
          r.setAttribute('data-theme', t)
          r.setAttribute('data-mode', m)
          r.style.colorScheme = m
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
