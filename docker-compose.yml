services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - DATA_DIR=/data
      - DB_PATH=/db/nifty.duckdb
      - WARM_EXPIRIES=2
    volumes:
      # Raw CSVs — used to BUILD the DuckDB (and as a fallback if no DB yet).
      # LEFT side = where your 2023/…/2026/ folders live on the VPS. ':ro' = read-only.
      - /opt/nifty-data:/data:ro
      # The fast DuckDB lives here. Build it once with:
      #   docker compose run --rm app python ingest.py
      # then the app serves every request in ~milliseconds.
      - /opt/nifty-db:/db
    expose:
      - "8000"
    # ── HTTP-only quick test (no domain/Caddy)? Comment out `expose` above and the
    #    whole `caddy` service below, and uncomment this to hit the VPS IP on :8000:
    # ports:
    #   - "8000:8000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
